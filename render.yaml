services:
  - type: web
    name: calorie-calculator
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --log-level warning
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
