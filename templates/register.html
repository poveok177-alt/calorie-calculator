<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ t.get('register','Регистрация') }}</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
body{
font-family:'Nunito',sans-serif;
background:#f9fdf9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.card{
background:white;
padding:40px;
border-radius:20px;
width:100%;
max-width:400px;
box-shadow:0 4px 20px rgba(76,175,131,.15);
}
input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:12px;
border:2px solid #c8eedd;
background:#e8f8f2;
}
button{
width:100%;
padding:14px;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#4caf83,#6dc49a);
color:white;
font-weight:800;
cursor:pointer;
}
h2{text-align:center;margin-bottom:20px}
</style>
</head>
<body>

<div class="card">
<h2>{{ t.get('register','Регистрация') }}</h2>

<form method="POST">
<input type="text" name="username" placeholder="Username" required>
<input type="email" name="email" placeholder="Email" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">🚀 {{ t.get('register','Создать аккаунт') }}</button>
</form>

</div>
</body>
</html>
