<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ t.app_name }} — {% block title %}{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --mint:#b5ead7; --mint-light:#e8f8f2; --green:#4caf83;
    --green-dark:#2d8a63; --green-soft:#6dc49a; --white:#ffffff;
    --cream:#f9fdf9; --text:#2d4a3e; --text-soft:#5a7a6e;
    --text-light:#8aaa9e; --border:#c8eedd; --shadow:rgba(76,175,131,.12);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;
    background-image:radial-gradient(circle at 20% 20%,rgba(181,234,215,.3) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(181,234,215,.2) 0%,transparent 50%);}
  nav{background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px var(--shadow);}
  .nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px;gap:16px;}
  .logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:var(--green-dark);text-decoration:none;display:flex;align-items:center;gap:8px;}
  .nav-link{padding:8px 14px;border-radius:20px;text-decoration:none;font-size:14px;font-weight:600;color:var(--text-soft);transition:all .2s;}
  .nav-link:hover{background:var(--mint-light);color:var(--green-dark);}
  .page-wrap{max-width:500px;margin:60px auto;padding:0 24px;}
  .card{background:white;border-radius:28px;padding:40px;box-shadow:0 8px 40px var(--shadow);border:1px solid var(--border);}
  .page-title{font-family:'Playfair Display',serif;font-size:28px;color:var(--text);text-align:center;margin-bottom:8px;}
  .page-subtitle{text-align:center;color:var(--text-light);font-size:14px;margin-bottom:32px;}
  .form-group{margin-bottom:20px;}
  .form-group label{display:block;font-size:13px;font-weight:700;color:var(--text-soft);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;}
  .form-group input{width:100%;padding:14px 18px;border:2px solid var(--border);border-radius:16px;font-size:15px;font-family:'Nunito',sans-serif;background:var(--mint-light);color:var(--text);outline:none;transition:all .25s;}
  .form-group input:focus{border-color:var(--green);background:white;box-shadow:0 0 0 4px rgba(76,175,131,.12);}
  .btn-submit{width:100%;padding:16px;margin-top:8px;background:linear-gradient(135deg,var(--green),var(--green-soft));color:white;border:none;border-radius:20px;font-size:16px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .2s;}
  .btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(76,175,131,.3);}
  .switch-link{text-align:center;margin-top:24px;font-size:14px;color:var(--text-soft);}
  .switch-link a{color:var(--green-dark);font-weight:700;text-decoration:none;}
  .switch-link a:hover{text-decoration:underline;}
  .flash{background:#ffebee;color:#c62828;padding:12px 18px;border-radius:14px;margin-bottom:20px;font-size:14px;font-weight:600;border:1px solid #ffcdd2;}
  .flash-ok{background:var(--mint);color:var(--green-dark);padding:12px 18px;border-radius:14px;margin-bottom:20px;font-size:14px;font-weight:600;}
  .deco{text-align:center;font-size:48px;margin-bottom:20px;}
  {% block extra_style %}{% endblock %}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="/" class="logo">🌿 {{ t.app_name }}</a>
    <div>
      <a href="/login" class="nav-link">{{ t.login }}</a>
      <a href="/register" class="nav-link">{{ t.register }}</a>
    </div>
  </div>
</nav>
{% block content %}{% endblock %}
</body>
</html>
