<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ t.app_name }} — {% block title %}{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --mint: #b5ead7; --mint-light: #e8f8f2; --green: #4caf83;
    --green-dark: #2d8a63; --green-soft: #6dc49a; --white: #ffffff;
    --cream: #f9fdf9; --text: #2d4a3e; --text-soft: #5a7a6e;
    --text-light: #8aaa9e; --border: #c8eedd;
    --shadow: rgba(76, 175, 131, 0.12);
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  /* Запрет горизонтального скролла */
  html, body { overflow-x: hidden; }
  /* Запрет автозума на iOS при фокусе на инпут */
  html { -webkit-text-size-adjust: 100%; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px; /* базовый шрифт — не меньше 13px */
    background-image: radial-gradient(circle at 20% 20%, rgba(181,234,215,0.3) 0%, transparent 50%),
                      radial-gradient(circle at 80% 80%, rgba(181,234,215,0.2) 0%, transparent 50%);
    /* Отступ снизу под bottom nav на всех страницах через base */
    padding-bottom: max(24px, env(safe-area-inset-bottom));
  }

  /* Все кнопки и ссылки — без двойного тапа на iOS */
  button, a { touch-action: manipulation; }

  nav {
    background: rgba(255,255,255,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border); padding: 0 24px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 20px var(--shadow);
  }
  .nav-inner {
    max-width: 1100px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px; gap: 16px;
  }
  .logo {
    font-family: 'Playfair Display', serif; font-size: 22px;
    font-weight: 600; color: var(--green-dark); text-decoration: none;
    display: flex; align-items: center; gap: 8px;
    white-space: nowrap;
  }
  .nav-link {
    padding: 8px 14px; border-radius: 20px; text-decoration: none;
    font-size: 14px; font-weight: 600; color: var(--text-soft); transition: all 0.2s;
    /* Минимальный размер касания */
    min-height: 44px; display: inline-flex; align-items: center;
  }
  .nav-link:hover { background: var(--mint-light); color: var(--green-dark); }

  /* ─── Форма / карточка ─── */
  .page-wrap {
    max-width: 500px; margin: 48px auto; padding: 0 16px;
  }
  .card {
    background: white; border-radius: 28px; padding: 36px 32px;
    box-shadow: 0 8px 40px var(--shadow); border: 1px solid var(--border);
  }
  .page-title {
    font-family: 'Playfair Display', serif; font-size: 26px;
    color: var(--text); text-align: center; margin-bottom: 8px;
  }
  .page-subtitle { text-align: center; color: var(--text-light); font-size: 14px; margin-bottom: 28px; }
  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block; font-size: 12px; font-weight: 700;
    color: var(--text-soft); margin-bottom: 7px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .form-group input {
    width: 100%; padding: 14px 18px;
    border: 2px solid var(--border); border-radius: 16px;
    /* font-size: 16px предотвращает zoom на iOS */
    font-size: 16px; font-family: 'Nunito', sans-serif;
    background: var(--mint-light); color: var(--text); outline: none; transition: all 0.25s;
    min-height: 48px;
  }
  .form-group input:focus {
    border-color: var(--green); background: white;
    box-shadow: 0 0 0 4px rgba(76,175,131,0.12);
  }
  .btn-submit {
    width: 100%; padding: 15px; margin-top: 8px;
    background: linear-gradient(135deg, var(--green), var(--green-soft));
    color: white; border: none; border-radius: 20px;
    font-size: 16px; font-weight: 800; font-family: 'Nunito', sans-serif;
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px;
    min-height: 52px;
  }
  .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(76,175,131,0.3); }
  .btn-submit:active { transform: translateY(0); }

  .switch-link {
    text-align: center; margin-top: 22px;
    font-size: 14px; color: var(--text-soft);
  }
  .switch-link a { color: var(--green-dark); font-weight: 700; text-decoration: none; }
  .switch-link a:hover { text-decoration: underline; }
  .flash {
    background: #ffebee; color: #c62828; padding: 12px 18px;
    border-radius: 14px; margin-bottom: 18px; font-size: 14px; font-weight: 600;
    border: 1px solid #ffcdd2;
  }
  .deco { text-align: center; font-size: 48px; margin-bottom: 18px; }

  /* ─── Мобильная адаптация для base ─── */
  @media (max-width: 540px) {
    nav { padding: 0 14px; }
    .nav-inner { height: 56px; gap: 8px; }
    .logo { font-size: 18px; }
    .nav-link { padding: 8px 10px; font-size: 13px; }

    .page-wrap { margin: 24px auto; padding: 0 12px; }
    .card { padding: 28px 20px; border-radius: 22px; }
    .page-title { font-size: 22px; }
    .form-group input { font-size: 16px; min-height: 50px; }
    .btn-submit { min-height: 52px; font-size: 15px; }
  }

  @media (max-width: 360px) {
    nav { padding: 0 10px; }
    .logo { font-size: 16px; }
    .nav-link { padding: 6px 8px; font-size: 12px; }
    .page-wrap { padding: 0 8px; }
    .card { padding: 22px 16px; border-radius: 18px; }
  }

  {% block extra_style %}{% endblock %}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="/" class="logo">🌿 {{ t.app_name }}</a>
    <div>
      <a href="/login" class="nav-link">{{ t.login }}</a>
      <a href="/register" class="nav-link">{{ t.register }}</a>
    </div>
  </div>
</nav>
{% block content %}{% endblock %}
</body>
</html>
