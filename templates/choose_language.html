<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CaloriMint — Choose Language</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    /* min-height с учётом safe area */
    min-height: -webkit-fill-available;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f9fdf9;
    background-image:
      radial-gradient(circle at 15% 85%, rgba(181,234,215,0.5) 0%, transparent 40%),
      radial-gradient(circle at 85% 15%, rgba(181,234,215,0.4) 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(208,240,228,0.2) 0%, transparent 60%);
    /* Горизонтального скролла нет */
    overflow-x: hidden;
    /* Отступы для safe area на iOS */
    padding: max(24px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom));
  }
  .container {
    max-width: 480px;
    width: 100%;
    text-align: center;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    color: #2d8a63;
    margin-bottom: 6px;
  }
  .tagline {
    color: #5a7a6e;
    font-size: 15px;
    margin-bottom: 36px;
    font-weight: 500;
  }
  .leaf-deco {
    font-size: 56px;
    display: block;
    margin-bottom: 12px;
    animation: float 3s ease-in-out infinite;
    will-change: transform;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .choose-title {
    font-size: 18px;
    font-weight: 700;
    color: #2d4a3e;
    margin-bottom: 24px;
  }
  .languages {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 28px;
  }
  .lang-card {
    background: white;
    border: 2px solid #c8eedd;
    border-radius: 20px;
    padding: 24px 16px;
    text-decoration: none;
    transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
    display: block;
    position: relative;
    overflow: hidden;
    /* Минимум для тапа */
    min-height: 100px;
    touch-action: manipulation;
  }
  .lang-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #b5ead7, #d0f0e4);
    opacity: 0;
    transition: opacity 0.25s;
  }
  .lang-card:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 12px 40px rgba(76,175,131,0.2); border-color: #4caf83; }
  .lang-card:hover::before { opacity: 1; }
  .lang-card:active { transform: scale(0.97); }
  .lang-flag { font-size: 36px; display: block; margin-bottom: 8px; position: relative; }
  .lang-name { font-size: 17px; font-weight: 800; color: #2d4a3e; position: relative; }
  .lang-native { font-size: 12px; color: #5a7a6e; margin-top: 3px; position: relative; }
  .footer-text {
    font-size: 12px;
    color: #8aaa9e;
    line-height: 1.6;
  }

  /* ─── Мобильная адаптация ─── */
  @media (max-width: 400px) {
    .logo { font-size: 26px; }
    .tagline { font-size: 13px; margin-bottom: 24px; }
    .leaf-deco { font-size: 44px; }
    .choose-title { font-size: 16px; margin-bottom: 18px; }
    .languages { gap: 10px; }
    .lang-card { padding: 18px 12px; min-height: 90px; border-radius: 16px; }
    .lang-flag { font-size: 30px; }
    .lang-name { font-size: 15px; }
    .lang-native { font-size: 11px; }
    .footer-text { font-size: 11px; }
  }

  @media (max-width: 320px) {
    body { padding: 16px 10px; }
    .logo { font-size: 22px; }
    .languages { gap: 8px; }
    .lang-card { padding: 14px 10px; border-radius: 14px; }
    .lang-name { font-size: 14px; }
  }
</style>
</head>
<body>
<div class="container">
  <span class="leaf-deco">🌿</span>
  <div class="logo">CaloriMint</div>
  <div class="tagline">Your body care starts here</div>

  <div class="choose-title">🌍 Выберите язык / Choose language</div>

  <div class="languages">
    <a href="/set-language/ru" class="lang-card">
      <span class="lang-flag">🇷🇺</span>
      <div class="lang-name">Русский</div>
      <div class="lang-native">Russian</div>
    </a>
    <a href="/set-language/en" class="lang-card">
      <span class="lang-flag">🇬🇧</span>
      <div class="lang-name">English</div>
      <div class="lang-native">Английский</div>
    </a>
    <a href="/set-language/uk" class="lang-card">
      <span class="lang-flag">🇺🇦</span>
      <div class="lang-name">Українська</div>
      <div class="lang-native">Ukrainian</div>
    </a>
    <a href="/set-language/kk" class="lang-card">
      <span class="lang-flag">🇰🇿</span>
      <div class="lang-name">Қазақша</div>
      <div class="lang-native">Kazakh</div>
    </a>
  </div>

  <div class="footer-text">
    🍎 База из 100+ продуктов · Умный поиск · Счётчик калорий<br>
    Вы можете сменить язык в любое время
  </div>
</div>
</body>
</html>
